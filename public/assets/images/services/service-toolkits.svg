<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a14de"/>
      <stop offset="50%" stop-color="#481093"/>
      <stop offset="100%" stop-color="#2d0663"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- 3x3 module grid -->
  <!-- row 1 -->
  <rect x="155" y="60"  width="75" height="60" rx="8" fill="#8b3dff" opacity="0.5" stroke="#c39bff" stroke-width="1"/>
  <rect x="245" y="60"  width="75" height="60" rx="8" fill="#fcd97a" opacity="0.25" stroke="#fcd97a" stroke-width="1.5"/>
  <rect x="335" y="60"  width="75" height="60" rx="8" fill="#8b3dff" opacity="0.4" stroke="#c39bff" stroke-width="1"/>
  <!-- row 2 -->
  <rect x="155" y="135" width="75" height="60" rx="8" fill="#fcd97a" opacity="0.2"  stroke="#fcd97a" stroke-width="1"/>
  <rect x="245" y="135" width="75" height="60" rx="8" fill="#7c22f5" opacity="0.7"  stroke="#a86bff" stroke-width="2"/>
  <rect x="335" y="135" width="75" height="60" rx="8" fill="#fcd97a" opacity="0.2"  stroke="#fcd97a" stroke-width="1"/>
  <!-- row 3 -->
  <rect x="155" y="210" width="75" height="55" rx="8" fill="#8b3dff" opacity="0.35" stroke="#c39bff" stroke-width="1"/>
  <rect x="245" y="210" width="75" height="55" rx="8" fill="#fcd97a" opacity="0.15" stroke="#fcd97a" stroke-width="1"/>
  <rect x="335" y="210" width="75" height="55" rx="8" fill="#8b3dff" opacity="0.45" stroke="#c39bff" stroke-width="1"/>
  <!-- center module gold dot -->
  <circle cx="282" cy="165" r="14" fill="#fcd97a" opacity="0.9"/>
  <circle cx="282" cy="165" r="7"  fill="white"   opacity="0.7"/>
  <!-- inner icon lines in corner modules (subtle) -->
  <line x1="172" y1="82"  x2="212" y2="82"  stroke="#c39bff" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="172" y1="92"  x2="200" y2="92"  stroke="#c39bff" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <!-- scatter -->
  <circle cx="90"  cy="60"  r="3" fill="#fcd97a" opacity="0.3"/>
  <circle cx="510" cy="240" r="3" fill="#fcd97a" opacity="0.3"/>
  <circle cx="530" cy="80"  r="2" fill="#c39bff" opacity="0.4"/>
  <circle cx="70"  cy="220" r="2" fill="#c39bff" opacity="0.4"/>
</svg>
