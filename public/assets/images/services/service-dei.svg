<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0663"/>
      <stop offset="55%" stop-color="#481093"/>
      <stop offset="100%" stop-color="#7c22f5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- overlapping circles representing diversity -->
  <circle cx="265" cy="155" r="90" fill="#8b3dff" opacity="0.25"/>
  <circle cx="335" cy="155" r="90" fill="#8b3dff" opacity="0.25"/>
  <circle cx="300" cy="100" r="90" fill="#8b3dff" opacity="0.25"/>
  <circle cx="265" cy="155" r="90" fill="none" stroke="#c39bff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="335" cy="155" r="90" fill="none" stroke="#c39bff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="300" cy="100" r="90" fill="none" stroke="#c39bff" stroke-width="1.5" opacity="0.5"/>
  <!-- gold center -->
  <circle cx="300" cy="138" r="18" fill="#fcd97a" opacity="0.85"/>
  <circle cx="300" cy="138" r="30" fill="none" stroke="#fcd97a" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="138" r="44" fill="none" stroke="#fcd97a" stroke-width="1" opacity="0.2"/>
  <!-- accent dots -->
  <circle cx="80" cy="60" r="3" fill="#fcd97a" opacity="0.35"/>
  <circle cx="520" cy="240" r="3" fill="#fcd97a" opacity="0.35"/>
  <circle cx="540" cy="80" r="2" fill="#c39bff" opacity="0.4"/>
  <circle cx="60" cy="220" r="2" fill="#c39bff" opacity="0.4"/>
  <circle cx="160" cy="270" r="4" fill="white" opacity="0.1"/>
  <circle cx="440" cy="30" r="4" fill="white" opacity="0.1"/>
</svg>
