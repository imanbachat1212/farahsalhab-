<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0663"/>
      <stop offset="55%" stop-color="#481093"/>
      <stop offset="100%" stop-color="#7c22f5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- open book shape -->
  <!-- left page -->
  <path d="M 190 90 Q 190 75 205 75 L 295 80 L 295 225 L 205 220 Q 190 220 190 205 Z"
        fill="#481093" stroke="#8b3dff" stroke-width="1.5" opacity="0.9"/>
  <!-- right page -->
  <path d="M 410 90 Q 410 75 395 75 L 305 80 L 305 225 L 395 220 Q 410 220 410 205 Z"
        fill="#481093" stroke="#8b3dff" stroke-width="1.5" opacity="0.9"/>
  <!-- spine -->
  <line x1="300" y1="78" x2="300" y2="224" stroke="#fcd97a" stroke-width="2.5" opacity="0.7"/>
  <!-- text lines on left page -->
  <line x1="210" y1="110" x2="285" y2="112" stroke="#fcd97a" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="210" y1="128" x2="282" y2="130" stroke="#c39bff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="210" y1="143" x2="278" y2="145" stroke="#c39bff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="210" y1="158" x2="284" y2="160" stroke="#c39bff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="210" y1="173" x2="270" y2="175" stroke="#c39bff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <!-- text lines on right page -->
  <line x1="315" y1="110" x2="390" y2="112" stroke="#c39bff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="315" y1="125" x2="388" y2="127" stroke="#c39bff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="315" y1="140" x2="385" y2="142" stroke="#c39bff" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
  <line x1="315" y1="155" x2="390" y2="157" stroke="#c39bff" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="315" y1="170" x2="375" y2="172" stroke="#fcd97a" stroke-width="2" opacity="0.55" stroke-linecap="round"/>
  <!-- light rays from book top -->
  <line x1="300" y1="72" x2="300" y2="40" stroke="#fcd97a" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  <line x1="300" y1="72" x2="268" y2="44" stroke="#fcd97a" stroke-width="1" opacity="0.25" stroke-dasharray="3 3"/>
  <line x1="300" y1="72" x2="332" y2="44" stroke="#fcd97a" stroke-width="1" opacity="0.25" stroke-dasharray="3 3"/>
  <!-- graduation cap above -->
  <rect x="280" y="25" width="40" height="7" rx="2" fill="#fcd97a" opacity="0.75"/>
  <polygon points="300,15 320,25 300,32 280,25" fill="#fcd97a" opacity="0.75"/>
  <!-- scatter dots -->
  <circle cx="90"  cy="70"  r="3" fill="#fcd97a" opacity="0.3"/>
  <circle cx="510" cy="230" r="3" fill="#fcd97a" opacity="0.3"/>
  <circle cx="530" cy="90"  r="2" fill="#c39bff" opacity="0.4"/>
  <circle cx="70"  cy="220" r="2" fill="#c39bff" opacity="0.4"/>
</svg>
