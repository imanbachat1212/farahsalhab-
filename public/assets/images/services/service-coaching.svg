<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d0663"/>
      <stop offset="50%" stop-color="#3d0e80"/>
      <stop offset="100%" stop-color="#7c22f5"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b3dff"/>
      <stop offset="100%" stop-color="#fcd97a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- growth path curve -->
  <path d="M 80 240 Q 200 230 250 180 Q 310 120 380 90 Q 440 65 520 50"
        fill="none" stroke="url(#pathGrad)" stroke-width="3" opacity="0.75" stroke-linecap="round"/>
  <!-- glow version -->
  <path d="M 80 240 Q 200 230 250 180 Q 310 120 380 90 Q 440 65 520 50"
        fill="none" stroke="#fcd97a" stroke-width="6" opacity="0.12" stroke-linecap="round"/>
  <!-- milestone dots on path -->
  <circle cx="160" cy="232" r="6" fill="#8b3dff" stroke="#c39bff" stroke-width="2"/>
  <circle cx="255" cy="177" r="6" fill="#a86bff" stroke="#c39bff" stroke-width="2"/>
  <circle cx="380" cy="90"  r="8" fill="#fcd97a" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <circle cx="520" cy="50"  r="11" fill="#fcd97a" opacity="0.95"/>
  <circle cx="520" cy="50"  r="6"  fill="white" opacity="0.8"/>
  <!-- radiating glow at top star -->
  <circle cx="520" cy="50" r="22" fill="none" stroke="#fcd97a" stroke-width="1.5" opacity="0.35"/>
  <circle cx="520" cy="50" r="36" fill="none" stroke="#fcd97a" stroke-width="1" opacity="0.18"/>
  <!-- subtle grid -->
  <line x1="0" y1="200" x2="600" y2="200" stroke="#8b3dff" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="150" x2="600" y2="150" stroke="#8b3dff" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="100" x2="600" y2="100" stroke="#8b3dff" stroke-width="1" opacity="0.1"/>
  <!-- scatter -->
  <circle cx="100" cy="60"  r="3" fill="#fcd97a" opacity="0.3"/>
  <circle cx="420" cy="250" r="3" fill="#fcd97a" opacity="0.3"/>
</svg>
