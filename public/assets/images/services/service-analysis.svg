<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#481093"/>
      <stop offset="50%" stop-color="#2d0663"/>
      <stop offset="100%" stop-color="#5812b5"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <!-- bar chart bars -->
  <rect x="170" y="195" width="36" height="60"  rx="4" fill="#8b3dff" opacity="0.6"/>
  <rect x="220" y="160" width="36" height="95"  rx="4" fill="#a86bff" opacity="0.65"/>
  <rect x="270" y="120" width="36" height="135" rx="4" fill="#c39bff" opacity="0.6"/>
  <rect x="320" y="90"  width="36" height="165" rx="4" fill="#fcd97a" opacity="0.8"/>
  <rect x="370" y="130" width="36" height="125" rx="4" fill="#c39bff" opacity="0.55"/>
  <rect x="420" y="170" width="36" height="85"  rx="4" fill="#a86bff" opacity="0.55"/>
  <!-- baseline -->
  <line x1="150" y1="255" x2="480" y2="255" stroke="#c39bff" stroke-width="1.5" opacity="0.4"/>
  <!-- magnifying glass -->
  <circle cx="490" cy="80" r="38" fill="none" stroke="#fcd97a" stroke-width="2.5" opacity="0.7"/>
  <circle cx="490" cy="80" r="26" fill="#fcd97a" opacity="0.1"/>
  <line x1="518" y1="108" x2="545" y2="140" stroke="#fcd97a" stroke-width="3.5" opacity="0.7" stroke-linecap="round"/>
  <!-- trend line over bars -->
  <polyline points="188,220 238,185 288,150 338,108 388,148 438,192"
            fill="none" stroke="#fcd97a" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 3"/>
  <!-- scatter -->
  <circle cx="80"  cy="70"  r="3" fill="#fcd97a" opacity="0.3"/>
  <circle cx="100" cy="240" r="2" fill="#c39bff" opacity="0.4"/>
</svg>
